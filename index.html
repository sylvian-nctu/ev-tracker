<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1118">
<title>EV Tracker</title>
<style>
:root{
  --bg:#0e1118; --s1:#181c28; --s2:#1f2336;
  --border:rgba(255,255,255,0.08);
  --text:#dde1f0; --text2:#7a7f99; --text3:#3e4259;
  --accent:#4f8ef7;
  --hp:#e05555; --atk:#f5924e; --def:#d4b83a;
  --spa:#5b9bf5; --spd:#5bcf8a; --spe:#d96bcf;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  display:flex;flex-direction:column;min-height:100%;
}

/* ── CONTROLS ── */
.controls{
  position:sticky;top:0;z-index:20;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  padding:10px 12px;
  display:flex;flex-direction:column;gap:7px;
}

/* stat buttons — 2 rows of 3 */
.stat-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}
.stat-btn{
  padding:11px 4px;border-radius:9px;border:2px solid transparent;
  background:var(--s2);color:var(--text2);
  font-size:13px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;touch-action:manipulation;transition:all .12s;
}
.stat-btn[data-s="hp"].sel  {background:var(--hp);  border-color:var(--hp);  color:#fff;}
.stat-btn[data-s="atk"].sel {background:var(--atk); border-color:var(--atk); color:#fff;}
.stat-btn[data-s="def"].sel {background:var(--def); border-color:var(--def); color:#1a1600;}
.stat-btn[data-s="spa"].sel {background:var(--spa); border-color:var(--spa); color:#fff;}
.stat-btn[data-s="spd"].sel {background:var(--spd); border-color:var(--spd); color:#0a2010;}
.stat-btn[data-s="spe"].sel {background:var(--spe); border-color:var(--spe); color:#fff;}

/* inc row */
.inc-row{display:flex;gap:5px;}
.inc-btn{
  flex:1;padding:9px 2px;border-radius:9px;
  background:var(--s2);border:2px solid transparent;
  color:var(--text2);font-size:14px;font-weight:700;
  cursor:pointer;touch-action:manipulation;transition:all .12s;
}
.inc-btn.sel{border-color:var(--accent);color:var(--text);}
.inc-custom{
  flex:1.6;padding:9px 6px;border-radius:9px;
  background:var(--s2);border:2px solid transparent;
  color:var(--text);font-size:13px;font-weight:700;
  text-align:center;outline:none;font-family:inherit;
  -webkit-appearance:none;
}
.inc-custom:focus{border-color:var(--accent);}
.inc-custom::placeholder{color:var(--text3);font-size:11px;font-weight:400;}

/* big +/- */
.big-row{display:flex;gap:8px;}
.big-btn{
  flex:1;border:none;border-radius:12px;
  font-size:44px;font-weight:300;
  cursor:pointer;touch-action:manipulation;
  transition:transform .08s;
  line-height:1;padding:28px 0;
}
.big-btn:active{transform:scale(0.94);}
.big-plus{background:#c0392b;color:#fff;}
.big-minus{background:var(--s2);color:var(--text2);}

.hint{font-size:11px;color:var(--text3);text-align:center;}
.hint b{color:var(--accent);font-weight:500;}

/* ── QUICK REPEAT ── */
.quick-section{padding:0 12px 4px;}
.quick-label{font-size:10px;color:var(--text3);margin-bottom:5px;letter-spacing:.4px;}
.quick-row{display:flex;gap:6px;}
.quick-btn{
  flex:1;background:var(--s2);border:1px solid var(--border);
  border-radius:9px;padding:9px 10px;
  cursor:pointer;touch-action:manipulation;
  text-align:left;font-family:inherit;
  transition:border-color .12s,background .12s;min-width:0;
}
.quick-btn:active{background:rgba(79,142,247,0.12);border-color:var(--accent);}
.quick-top{
  font-size:12px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:2px;display:flex;align-items:center;gap:5px;
}
.quick-sub{
  font-size:10px;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.q-badge{
  font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:5px;flex-shrink:0;
}

/* ── POKEMON LIST ── */
.poke-list{display:flex;flex-direction:column;gap:8px;padding:10px 12px 0;}
.poke-card{
  background:var(--s1);border:2px solid var(--border);
  border-radius:12px;padding:11px 13px;
  cursor:pointer;touch-action:manipulation;
  transition:border-color .15s,box-shadow .15s;user-select:none;
}
.poke-card.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,0.15);}
.poke-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sel-dot{
  width:18px;height:18px;flex-shrink:0;
  border:2px solid var(--text3);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
}
.poke-card.sel .sel-dot{background:var(--accent);border-color:var(--accent);}
.sel-dot::after{content:'';display:block;width:7px;height:7px;border-radius:50%;background:#fff;opacity:0;transition:opacity .12s;}
.poke-card.sel .sel-dot::after{opacity:1;}
.poke-name{
  flex:1;background:transparent;border:none;
  border-bottom:1px solid transparent;
  color:var(--text);font-size:14px;font-weight:600;
  outline:none;font-family:inherit;padding:1px 2px;
}
.poke-name:focus{border-bottom-color:var(--accent);}
.ev-badge{font-size:11px;color:var(--text3);flex-shrink:0;letter-spacing:.3px;}
.ev-badge.warn{color:var(--atk);}
.ev-badge.full{color:var(--spe);}
.card-btns{display:flex;gap:5px;}
.card-btn{
  background:var(--s2);border:1px solid var(--border);
  color:var(--text2);border-radius:7px;
  font-size:13px;cursor:pointer;
  padding:5px 12px;touch-action:manipulation;
  line-height:1;font-family:inherit;font-weight:600;
  transition:all .15s;white-space:nowrap;
}
.confirming-rst{background:rgba(79,142,247,0.15);border-color:var(--accent);color:var(--accent);animation:pulse .8s ease infinite;}
.confirming-del{background:rgba(224,85,85,0.15);border-color:var(--hp);color:var(--hp);animation:pulse .8s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}

.mini-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;}
.mstat{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mstat-lbl{font-size:9px;font-weight:700;letter-spacing:.3px;}
.mstat-val{font-size:15px;font-weight:700;line-height:1;}
.mstat-bar{width:100%;height:4px;background:var(--s2);border-radius:2px;overflow:hidden;}
.mstat-fill{height:100%;border-radius:2px;transition:width .2s;}
.mstat:not(.active){opacity:.5;}

.add-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;border-radius:12px;
  border:2px dashed var(--border);background:none;
  color:var(--text3);font-size:14px;cursor:pointer;
  touch-action:manipulation;font-family:inherit;transition:all .12s;
}
.add-btn:active{border-color:var(--accent);color:var(--accent);}

/* ── LOG ── */
.log-section{
  margin:10px 12px 36px;
  border:1px solid var(--border);border-radius:12px;overflow:hidden;
}
.log-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;border-bottom:1px solid var(--border);background:var(--s1);
}
.log-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.5px;}
.log-clear{
  background:none;border:none;color:var(--text3);
  font-size:11px;cursor:pointer;font-family:inherit;padding:2px 4px;
}
.log-clear:active{color:var(--hp);}
.log-body{background:var(--s1);}
.log-empty{padding:14px;text-align:center;font-size:12px;color:var(--text3);}
.log-item{
  display:flex;align-items:baseline;gap:8px;
  padding:9px 13px;border-bottom:1px solid var(--border);
}
.log-item:last-child{border-bottom:none;}
.log-time{font-size:10px;color:var(--text3);flex-shrink:0;letter-spacing:.3px;}
.log-text{font-size:12px;color:var(--text2);line-height:1.5;}
.log-text b{color:var(--text);font-weight:600;}
.log-stat-badge{
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:4px;display:inline-block;vertical-align:middle;
}
</style>
</head>
<body>

<div class="controls">
  <!-- 2-row stat grid -->
  <div class="stat-grid">
    <button class="stat-btn sel" data-s="hp">HP</button>
    <button class="stat-btn" data-s="atk">ATK</button>
    <button class="stat-btn" data-s="def">DEF</button>
    <button class="stat-btn" data-s="spa">SpA</button>
    <button class="stat-btn" data-s="spd">SpD</button>
    <button class="stat-btn" data-s="spe">SPE</button>
  </div>
  <div class="inc-row">
    <button class="inc-btn sel" data-inc="1">1</button>
    <button class="inc-btn" data-inc="2">2</button>
    <button class="inc-btn" data-inc="3">3</button>
    <button class="inc-btn" data-inc="5">5</button>
    <button class="inc-btn" data-inc="10">10</button>
    <input class="inc-custom" id="inc-custom" type="number" min="1" max="252" placeholder="自訂">
  </div>
  <div class="big-row">
    <button class="big-btn big-plus" id="btn-plus">+</button>
    <button class="big-btn big-minus" id="btn-minus">−</button>
  </div>
  <div class="hint" id="hint">點卡片選取寶可夢，再按 + / −</div>
</div>

<div class="quick-section" id="quick-section" style="display:none">
  <div class="quick-label">QUICK REPEAT</div>
  <div class="quick-row" id="quick-row"></div>
</div>

<div class="poke-list" id="poke-list"></div>

<div class="log-section">
  <div class="log-header">
    <span class="log-title">操作紀錄</span>
    <button class="log-clear" id="log-clear">清除</button>
  </div>
  <div class="log-body" id="log-body">
    <div class="log-empty">尚無紀錄</div>
  </div>
</div>

<script>
const STATS=['hp','atk','def','spa','spd','spe'];
const LABEL={hp:'HP',atk:'ATK',def:'DEF',spa:'SpA',spd:'SpD',spe:'SPE'};
const SCOLOR={hp:'var(--hp)',atk:'var(--atk)',def:'var(--def)',spa:'var(--spa)',spd:'var(--spd)',spe:'var(--spe)'};
const SBG={hp:'rgba(224,85,85,.2)',atk:'rgba(245,146,78,.2)',def:'rgba(212,184,58,.2)',spa:'rgba(91,155,245,.2)',spd:'rgba(91,207,138,.2)',spe:'rgba(217,107,207,.2)'};
const MAX_STAT=252,MAX_TOT=510,LS='pkev_data';
const OLD_KEYS=['pkev7','pkev6','pkev5','pkev4','pkev3','pkev2'];
let nextId=0,state=[],selected=new Set();
let activeStat='hp',activeInc=1;
let opHistory=[];
let opLog=[];
const confirmState={};

function save(){localStorage.setItem(LS,JSON.stringify({nextId,state,opHistory,opLog}));}
function load(){
  // try current key first
  try{
    const d=JSON.parse(localStorage.getItem(LS)||'null');
    if(d&&d.state&&d.state.length){
      nextId=d.nextId||0;state=d.state;opHistory=d.opHistory||[];opLog=d.opLog||[];return;
    }
  }catch(e){}
  // migrate from any old key
  for(const key of OLD_KEYS){
    try{
      const d=JSON.parse(localStorage.getItem(key)||'null');
      if(d&&d.state&&d.state.length){
        nextId=d.nextId||0;state=d.state;opHistory=d.opHistory||[];opLog=d.opLog||[];
        save(); // write to new key
        localStorage.removeItem(key); // clean up old key
        return;
      }
    }catch(e){}
  }
  addPoke(false);
}
function tot(p){return STATS.reduce((a,s)=>a+p.ev[s],0);}
function addPoke(doSave=true){
  const p={id:nextId++,name:'寶可夢',ev:{hp:0,atk:0,def:0,spa:0,spd:0,spe:0}};
  state.push(p);if(doSave){save();render();}return p;
}
function removePoke(id){
  if(state.length<=1)return;
  cancelConfirm(id);
  state=state.filter(p=>p.id!==id);selected.delete(id);
  save();render();
}
function resetPoke(id){
  cancelConfirm(id);
  const p=state.find(x=>x.id===id);if(!p)return;
  addLog(`重置 <b>${p.name}</b> 所有 EV`);
  STATS.forEach(s=>p.ev[s]=0);save();render();
}

/* confirm */
const COUNTDOWN=3;
function cancelConfirm(id){
  if(confirmState[id]){clearInterval(confirmState[id].timer);delete confirmState[id];}
}
function startConfirm(id,action){
  if(confirmState[id]&&confirmState[id].action===action){
    if(action==='del')removePoke(id);else resetPoke(id);return;
  }
  cancelConfirm(id);
  let remaining=COUNTDOWN;
  confirmState[id]={action,remaining,timer:null};
  confirmState[id].timer=setInterval(()=>{
    remaining--;
    if(confirmState[id])confirmState[id].remaining=remaining;
    if(remaining<=0){cancelConfirm(id);renderCardButtons(id);return;}
    renderCardButtons(id);
  },1000);
  renderCardButtons(id);
}
function renderCardButtons(id){
  const cs=confirmState[id];
  const card=document.querySelector(`[data-id="${id}"]`);
  if(!card)return;
  const br=card.querySelector('.card-btns');if(!br)return;
  br.innerHTML='';
  const rb=document.createElement('button');
  rb.className='card-btn'+(cs&&cs.action==='rst'?' confirming-rst':'');
  rb.textContent=cs&&cs.action==='rst'?`重置 ${cs.remaining}s`:'↺ 重置';
  rb.addEventListener('click',e=>{e.stopPropagation();startConfirm(id,'rst');});
  br.appendChild(rb);
  if(cs){
    const cb=document.createElement('button');cb.className='card-btn';
    cb.textContent='取消';cb.style.color='var(--text3)';
    cb.addEventListener('click',e=>{e.stopPropagation();cancelConfirm(id);renderCardButtons(id);});
    br.appendChild(cb);
  }
  if(state.length>1){
    const db=document.createElement('button');
    db.className='card-btn'+(cs&&cs.action==='del'?' confirming-del':'');
    db.textContent=cs&&cs.action==='del'?`刪除 ${cs.remaining}s`:'✕ 刪除';
    db.addEventListener('click',e=>{e.stopPropagation();startConfirm(id,'del');});
    br.appendChild(db);
  }
}

/* log */
function nowStr(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function addLog(text){
  opLog.unshift({time:nowStr(),text});
  if(opLog.length>50)opLog.length=50;
}
function renderLog(){
  const body=document.getElementById('log-body');
  if(!opLog.length){body.innerHTML='<div class="log-empty">尚無紀錄</div>';return;}
  body.innerHTML='';
  for(const e of opLog){
    const item=document.createElement('div');item.className='log-item';
    const t=document.createElement('div');t.className='log-time';t.textContent=e.time;
    const tx=document.createElement('div');tx.className='log-text';tx.innerHTML=e.text;
    item.appendChild(t);item.appendChild(tx);body.appendChild(item);
  }
}

/* ── quick repeat — key fix: only push if different from top ── */
function opKey(op){return `${op.stat}|${op.inc}|${op.sign}|${op.ids.slice().sort().join(',')}`;}
function pushOp(op){
  // If identical to the most recent op → don't update history at all
  if(opHistory.length>0&&opKey(op)===opKey(opHistory[0]))return;
  opHistory.unshift(op);
  if(opHistory.length>2)opHistory.length=2;
}

function renderQuick(){
  const section=document.getElementById('quick-section');
  const row=document.getElementById('quick-row');
  if(!opHistory.length){section.style.display='none';return;}
  section.style.display='block';
  row.innerHTML='';
  for(const op of opHistory){
    const btn=document.createElement('button');btn.className='quick-btn';
    const sign=op.sign>0?'+':'−';
    btn.innerHTML=`
      <div class="quick-top">
        <span class="q-badge" style="background:${SBG[op.stat]};color:${SCOLOR[op.stat]}">${LABEL[op.stat]}</span>
        ${sign}${op.inc}
      </div>
      <div class="quick-sub">${op.names.join('、')}</div>`;
    btn.addEventListener('click',()=>replayOp(op));
    row.appendChild(btn);
  }
}

function replayOp(op){
  const targets=op.ids.filter(id=>state.find(p=>p.id===id));
  if(!targets.length)return;
  const affected=[];
  for(const id of targets){
    const p=state.find(x=>x.id===id);if(!p)continue;
    const cur=p.ev[op.stat],rem=MAX_TOT-tot(p);
    const before=cur;
    if(op.sign>0) p.ev[op.stat]=cur+Math.min(op.inc,MAX_STAT-cur,Math.max(0,rem));
    else p.ev[op.stat]=Math.max(0,cur-op.inc);
    if(p.ev[op.stat]!==before)affected.push(p.name);
  }
  if(affected.length){
    const sign=op.sign>0?'+':'−';
    addLog(`<span class="log-stat-badge" style="background:${SBG[op.stat]};color:${SCOLOR[op.stat]}">${LABEL[op.stat]}</span> ${sign}${op.inc}　<b>${affected.join('、')}</b>　<span style="color:var(--text3)">(repeat)</span>`);
    // replay counts as a new op — but same key so pushOp won't duplicate
    const newOp={...op,ids:targets,names:targets.map(id=>state.find(p=>p.id===id)?.name||'')};
    pushOp(newOp);
  }
  save();render();
}

/* apply delta */
function applyDelta(sign){
  if(!selected.size){updateHint(true);return;}
  const targets=[...selected];
  const affected=[];
  for(const id of targets){
    const p=state.find(x=>x.id===id);if(!p)continue;
    const cur=p.ev[activeStat],rem=MAX_TOT-tot(p);
    const before=cur;
    if(sign>0) p.ev[activeStat]=cur+Math.min(activeInc,MAX_STAT-cur,Math.max(0,rem));
    else p.ev[activeStat]=Math.max(0,cur-activeInc);
    if(p.ev[activeStat]!==before)affected.push({id,name:p.name});
  }
  if(affected.length){
    const names=affected.map(a=>a.name);
    const ids=affected.map(a=>a.id);
    const sign2=sign>0?'+':'−';
    addLog(`<span class="log-stat-badge" style="background:${SBG[activeStat]};color:${SCOLOR[activeStat]}">${LABEL[activeStat]}</span> ${sign2}${activeInc}　<b>${names.join('、')}</b>`);
    pushOp({stat:activeStat,inc:activeInc,sign,ids,names});
  }
  save();render();
}

function updateHint(warn=false){
  const h=document.getElementById('hint');
  const sl=LABEL[activeStat];
  if(warn){h.innerHTML='← 先點卡片選取寶可夢';return;}
  if(!selected.size) h.innerHTML=`<b>${sl}</b> ×${activeInc}　→ 點卡片選取`;
  else{
    const names=[...selected].map(id=>state.find(p=>p.id===id)?.name||'').join('、');
    h.innerHTML=`<b>${sl}</b> ×${activeInc}　→ <b>${names}</b>`;
  }
}

function render(){
  document.querySelectorAll('.stat-btn').forEach(b=>b.classList.toggle('sel',b.dataset.s===activeStat));
  updateHint();renderQuick();renderLog();
  const list=document.getElementById('poke-list');list.innerHTML='';
  for(const poke of state){
    const t=tot(poke),isSel=selected.has(poke.id);
    const card=document.createElement('div');
    card.className='poke-card'+(isSel?' sel':'');card.dataset.id=poke.id;
    card.addEventListener('click',e=>{
      if(e.target.classList.contains('poke-name')||e.target.closest('.card-btns'))return;
      if(selected.has(poke.id))selected.delete(poke.id);else selected.add(poke.id);
      render();
    });
    const hdr=document.createElement('div');hdr.className='poke-hdr';
    const dot=document.createElement('div');dot.className='sel-dot';hdr.appendChild(dot);
    const ni=document.createElement('input');
    ni.className='poke-name';ni.type='text';ni.value=poke.name;ni.maxLength=14;
    ni.addEventListener('click',e=>e.stopPropagation());
    ni.addEventListener('input',e=>{poke.name=e.target.value;save();updateHint();});
    hdr.appendChild(ni);
    const badge=document.createElement('div');
    badge.className='ev-badge'+(t>=MAX_TOT?' full':t>=450?' warn':'');
    badge.textContent=t+'/510';hdr.appendChild(badge);
    const br=document.createElement('div');br.className='card-btns';hdr.appendChild(br);
    card.appendChild(hdr);
    const ms=document.createElement('div');ms.className='mini-stats';
    for(const s of STATS){
      const ev=poke.ev[s];
      const col=document.createElement('div');col.className='mstat'+(s===activeStat?' active':'');
      col.innerHTML=`<div class="mstat-lbl" style="color:${SCOLOR[s]}">${LABEL[s]}</div><div class="mstat-val" style="color:${s===activeStat?SCOLOR[s]:'var(--text)'}">${ev}</div><div class="mstat-bar"><div class="mstat-fill" style="width:${ev/MAX_STAT*100}%;background:${SCOLOR[s]}"></div></div>`;
      ms.appendChild(col);
    }
    card.appendChild(ms);list.appendChild(card);
    renderCardButtons(poke.id);
  }
  const add=document.createElement('button');add.className='add-btn';
  add.innerHTML='<span style="font-size:20px;font-weight:200;line-height:1">+</span> 新增寶可夢';
  add.addEventListener('click',()=>{
    const p=addPoke();selected.clear();selected.add(p.id);render();
    setTimeout(()=>{const ins=document.querySelectorAll('.poke-name');if(ins.length){ins[ins.length-1].focus();ins[ins.length-1].select();}},40);
  });
  list.appendChild(add);
}

document.querySelectorAll('.stat-btn').forEach(b=>{
  b.addEventListener('click',()=>{activeStat=b.dataset.s;render();});
});
document.querySelectorAll('.inc-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    activeInc=Number(b.dataset.inc);
    document.querySelectorAll('.inc-btn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');document.getElementById('inc-custom').value='';updateHint();
  });
});
document.getElementById('inc-custom').addEventListener('input',e=>{
  const v=parseInt(e.target.value)||0;
  if(v>0){activeInc=v;document.querySelectorAll('.inc-btn').forEach(x=>x.classList.remove('sel'));updateHint();}
});
document.getElementById('btn-plus').addEventListener('click',()=>applyDelta(1));
document.getElementById('btn-minus').addEventListener('click',()=>applyDelta(-1));
document.getElementById('log-clear').addEventListener('click',()=>{opLog=[];save();renderLog();});

load();render();
</script>
</body>
</html>
